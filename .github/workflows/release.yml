name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test built CLI
        run: npm run smoke

      - name: Smoke test packed CLI
        run: npm run smoke:pack

      - name: Benchmark
        run: npm run benchmark

      - name: Release preflight
        run: npm run release:preflight

      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Skip npm publish without NPM_TOKEN
        if: env.NPM_TOKEN == ''
        run: |
          echo "::warning::NPM_TOKEN secret is not configured. Release gate passed, but npm publish was skipped."
          echo "Publish locally only as an explicit maintainer fallback, then add NPM_TOKEN before the next automated release."
